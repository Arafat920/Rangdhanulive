<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rangdhanu Live - Netflix Style</title>
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/18212/18212624.png" type="image/png">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header id="header">
        <h1 class="logo" onclick="location.reload()">RANGDHANU</h1>
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Search movies...">
            <button id="searchBtn">🔍</button>
        </div>
    </header>

    <section id="hero" class="hero">
        <div id="heroContent" class="hero-content"></div>
    </section>

    <main id="mainContent">
        <!-- Trending Row -->
        <div class="row-container">
            <h2>Trending Now</h2>
            <div class="row-wrapper">
                <button class="handle left-handle" onclick="scrollRow('trendingRow', -1)">&#10094;</button>
                <div id="trendingRow" class="movie-row"></div>
                <button class="handle right-handle" onclick="scrollRow('trendingRow', 1)">&#10095;</button>
            </div>
        </div>

        <!-- Top Rated Row -->
        <div class="row-container">
            <h2>Top Rated</h2>
            <div class="row-wrapper">
                <button class="handle left-handle" onclick="scrollRow('topRatedRow', -1)">&#10094;</button>
                <div id="topRatedRow" class="movie-row"></div>
                <button class="handle right-handle" onclick="scrollRow('topRatedRow', 1)">&#10095;</button>
            </div>
        </div>

        <!-- Action Row -->
        <div class="row-container">
            <h2>Action Thriller</h2>
            <div class="row-wrapper">
                <button class="handle left-handle" onclick="scrollRow('actionRow', -1)">&#10094;</button>
                <div id="actionRow" class="movie-row"></div>
                <button class="handle right-handle" onclick="scrollRow('actionRow', 1)">&#10095;</button>
            </div>
        </div>
    </main>

    <div id="searchResults" class="search-grid" style="display:none;"></div>

    <div id="movieModal" class="modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <div id="modalDetails"></div>
        </div>
    </div>

    <footer>
        <div class="footer-content">
            <p>&copy; 2025 <span class="logo-text">RANGDHANU LIVE</span>. All Rights Reserved.</p>
            <p>Developed with ❤️ by <a href="https://github.com/Arafat920" target="_blank" class="dev-link">Arafat</a></p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
