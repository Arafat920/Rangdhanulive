<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rangdhanu Live - OTT Platform</title>
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/18212/18212624.png" type="image/png">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header id="header">
        <div class="header-left">
            <h1 class="logo" onclick="loadContent('home')">RANGDHANU</h1>
            <nav class="nav-menu">
    <ul>
        <li id="menu-home" onclick="loadContent('home')">Home</li>
        <li id="menu-tv" onclick="loadContent('tv')">TV Shows</li>
        <li id="menu-movies" onclick="loadContent('movies')">Movies</li>
        <li id="menu-latest" onclick="loadContent('latest')">Latest</li>
    </ul>
            </nav>
        </div>
        <div class="header-right">
            <div class="search-container">
                <input type="text" id="searchInput" placeholder="Search...">
                <button id="searchBtn">🔍</button>
            </div>
        </div>
    </header>

    <section id="hero" class="hero">
        <div id="heroContent" class="hero-content"></div>
    </section>

    <main id="mainContent">
        <!-- রোগুলো ডায়নামিকভাবে আসবে -->
        <div id="rowsContainer"></div>
    </main>

    <div id="searchResults" class="search-grid" style="display:none;"></div>

    <div id="movieModal" class="modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <div id="modalDetails"></div>
        </div>
    </div>

    <footer>
        <div class="footer-content">
            <p>&copy; 2025 <span class="logo-text">RANGDHANU LIVE</span>. All Rights Reserved.</p>
            <p>Developed with ❤️ by <a href="https://github.com/Arafat920" target="_blank" class="dev-link">Arafat</a></p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
